{% extends "base.html" %}

{% block title %}Edit {{ student.name }} - School Management System{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container-fluid">
        <h1><i class="fas fa-edit"></i> Edit Student</h1>
        <p>Update student information</p>
    </div>
</div>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="fas fa-form"></i> Student Information</h5>
                </div>
                <div class="card-body">
                    <form method="POST" action="{% url 'edit_student' student.id %}" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="name" class="form-label"><i class="fas fa-user"></i> Full Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-lg" id="name" name="name" required value="{{ student.name }}" placeholder="Enter student name">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label"><i class="fas fa-envelope"></i> Email Address <span class="text-danger">*</span></label>
                                <input type="email" class="form-control form-control-lg" id="email" name="email" required value="{{ student.email }}" placeholder="Enter student email">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="student_class" class="form-label"><i class="fas fa-book"></i> Class <span class="text-danger">*</span></label>
                                <select class="form-select form-select-lg" id="student_class" name="student_class" required>
                                    <option value="">-- Select Class --</option>
                                    {% for cls in classes %}
                                        <option value="{{ cls }}" {% if cls|stringformat:"s" == student.student_class %}selected{% endif %}>Class {{ cls }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="roll_number" class="form-label"><i class="fas fa-list"></i> Roll Number</label>
                                <input type="number" class="form-control form-control-lg" id="roll_number" name="roll_number" value="{{ student.roll_number|default:'' }}" placeholder="Enter roll number">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="register_number" class="form-label"><i class="fas fa-qrcode"></i> Register Number</label>
                                <input type="text" class="form-control form-control-lg" id="register_number" name="register_number" value="{{ student.register_number|default:'' }}" placeholder="Enter register number">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="age" class="form-label"><i class="fas fa-birthday-cake"></i> Age</label>
                                <input type="number" class="form-control form-control-lg" id="age" name="age" value="{{ student.age|default:'' }}" placeholder="Enter age">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="phone" class="form-label"><i class="fas fa-phone"></i> Phone Number</label>
                                <input type="tel" class="form-control form-control-lg" id="phone" name="phone" value="{{ student.phone|default:'' }}" placeholder="Enter phone number">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="profile_image" class="form-label"><i class="fas fa-image"></i> Profile Image</label>
                                {% if student.profile_image %}
                                    <div class="mb-2">
                                        <img src="{{ student.profile_image.url }}" alt="{{ student.name }}" style="max-width: 150px; max-height: 150px; border-radius: 5px;">
                                        <p class="small text-muted">Current Image</p>
                                    </div>
                                {% endif %}
                                <input type="file" class="form-control form-control-lg" id="profile_image" name="profile_image" accept="image/*">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="address" class="form-label"><i class="fas fa-map-marker-alt"></i> Address</label>
                            <textarea class="form-control form-control-lg" id="address" name="address" rows="4" placeholder="Enter student address">{{ student.address|default:'' }}</textarea>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'student_detail' student.id %}" class="btn btn-secondary btn-lg">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-warning btn-lg">
                                <i class="fas fa-save"></i> Update Student
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
