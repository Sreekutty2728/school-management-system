<!DOCTYPE html>
<html>
<head>
    <title>Parent List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Parent List</h2>

    <a href="/parents/add-parent/" class="btn btn-primary mb-3">
        Add Parent
    </a>

    <table class="table table-bordered table-striped">

        <thead>
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
            </tr>
        </thead>

        <tbody>

        {% for parent in parents %}

        <tr>
            <td>{{ parent.name }}</td>
            <td>{{ parent.phone }}</td>
            <td>{{ parent.email }}</td>
        </tr>

        {% empty %}

        <tr>
            <td colspan="3" class="text-center">
                No Parents Found
            </td>
        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
