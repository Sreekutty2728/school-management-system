<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1>🏫 Administrator Dashboard</h1>

    <hr>

    <div class="row g-3">

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h5>Total Students</h5>
                    <h2>{{ total_students }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h5>Total Teachers</h5>
                    <h2>{{ total_teachers }}</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
    <div class="card shadow">
        <div class="card-body">
            <h5>Total Classes</h5>
            <h2>10</h2>
        </div>
    </div>
</div>
<div class="col-md-4">
    <div class="card shadow">
        <div class="card-body">
            <h5>Total Parents</h5>
            <h2>0</h2>
        </div>
    </div>
</div>
<div class="col-md-4">
    <div class="card shadow">
        <div class="card-body">
            <h5>Total Staff</h5>
            <h2>0</h2>
        </div>
    </div>
</div>


    </div>

</div>
<hr>

<h3>Quick Actions</h3>
<div class="row mt-3">

    <div class="col-md-3">
        <a href="/students/add-student/" class="btn btn-primary w-100">
            Add Student
        </a>
    </div>

    <div class="col-md-3">
        <a href="/students/list/" class="btn btn-success w-100">
            View Students
        </a>
    </div>

    <div class="col-md-3">
        <a href="/teachers/add-teacher/" class="btn btn-warning w-100">
            Add Teacher
        </a>
    </div>

    <div class="col-md-3">
        <a href="/teachers/list/" class="btn btn-info w-100">
            View Teachers
        </a>
    </div>

</div>

</body>
</html>
