<!DOCTYPE html>
<html>
<head>
    <title>Staff List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Staff List</h2>

    <a href="/staff/add-staff/" class="btn btn-primary mb-3">
        Add Staff
    </a>

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
            </tr>
        </thead>

        <tbody>

        {% for staff in staffs %}

        <tr>
            <td>{{ staff.name }}</td>
            <td>{{ staff.phone }}</td>
            <td>{{ staff.email }}</td>
        </tr>

        {% empty %}

        <tr>
            <td colspan="3">No Staff Found</td>
        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
